@for(blackHandPiece of blackHandPieces(); track $index){
<app-piece [pieceData]="blackHandPiece" [currentTurn]="currentTurn()" (selected)="ClickHandPiece($event)"
    (showRulePiece)="showRulePiece.emit($event)"></app-piece>
}

@for(whiteHandPiece of whiteHandPieces(); track $index){
<app-piece [pieceData]="whiteHandPiece" [currentTurn]="currentTurn()" (selected)="ClickHandPiece($event)"
    (showRulePiece)="showRulePiece.emit($event)"></app-piece>
}
